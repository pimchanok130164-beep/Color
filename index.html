<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับสี</title>
    <style>
        /* CSS โครงสร้างเดิมของบอส (ไม่มีการเปลี่ยนแปลง) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; }
        h1 { margin-bottom: 10px; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); color: #4a4a4a; }
        .score-board { font-size: 1.2rem; margin-bottom: 20px; background: rgba(255, 255, 255, 0.8); padding: 8px 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 500px; width: 90%; perspective: 1000px; }
        .card { aspect-ratio: 1 / 1; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card:active { transform: scale(0.95); transition: transform 0.1s; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .card-back { background-color: #2c3e50; color: white; font-size: 2rem; }
        .card-front { transform: rotateY(180deg); }
        .btn-reset { margin-top: 25px; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; background-color: #ff7675; color: white; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s; }
        .btn-reset:hover { background-color: #ff5252; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>เกมสี</h1>
    
    <div class="score-board">
        จำนวนครั้งที่เปิด: <span id="clicks">0</span> ครั้ง
    </div>

    <div class="game-board" id="board"></div>

    <button class="btn-reset" onclick="resetGame()">เริ่มเกมใหม่</button>

    <script>
        // --- 🎵 ส่วนตั้งค่าเสียง (อัปเดตใหม่) 🎵 ---
        // ใช้ลิงก์เสียงตัวอย่าง บอสสามารถเปลี่ยนเป็นลิงก์ไฟล์ของตัวเองได้
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const matchSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3');

        // ฟังก์ชันเล่นเสียง (ลดระดับเสียงลงนิดหน่อยเพื่อไม่ให้ดังเกินไป)
        function playSound(audioElement) {
            audioElement.currentTime = 0; // รีเซ็ตเสียงให้เริ่มจาก 0 เสมอ เพื่อให้กดรัวๆ แล้วเสียงไม่หาย
            audioElement.volume = 0.5; // ตั้งระดับเสียงที่ 50%
            audioElement.play().catch(e => console.log("เบราว์เซอร์บล็อกเสียงอัตโนมัติ")); 
        }
        // ------------------------------------------

        const colors = [
            '#ff4757', '#ff4757', 
            '#2ed573', '#2ed573', 
            '#1e90ff', '#1e90ff', 
            '#ffa502', '#ffa502', 
            '#9b59b6', '#9b59b6', 
            '#11bbc1', '#11bbc1'  
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let clicks = 0;
        let isLockBoard = false;

        const board = document.getElementById('board');
        const clicksDisplay = document.getElementById('clicks');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const shuffledColors = shuffle([...colors]);
            board.innerHTML = '';
            
            shuffledColors.forEach((color) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.color = color;

                card.innerHTML = `
                    <div class="card-front" style="background-color: ${color}"></div>
                    <div class="card-back">❓</div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (isLockBoard || this.classList.contains('flipped') || flippedCards.includes(this)) return;

            // 🎵 เรียกใช้เสียง Pop เมื่อมีการ์ดถูกพลิก 🎵
            playSound(popSound);

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                clicks++;
                clicksDisplay.textContent = clicks;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.color === card2.dataset.color;

            if (isMatch) {
                // 🎵 เรียกใช้เสียง Match เมื่อจับคู่ถูกต้อง 🎵
                setTimeout(() => playSound(matchSound), 200); // ดีเลย์นิดนึงให้ภาพพลิกเสร็จก่อน

                flippedCards = [];
                matchedCount += 2;
                
                if (matchedCount === colors.length) {
                    setTimeout(() => {
                        // 🎵 เรียกใช้เสียง Win เมื่อชนะเกม 🎵
                        playSound(winSound);
                        alert(`ยินดีด้วยคุณชนะแล้ว! 🎉 ใช้การเปิดทั้งหมด ${clicks} ครั้ง`);
                    }, 500);
                }
            } else {
                isLockBoard = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLockBoard = false;
                }, 1000);
            }
        }

        function resetGame() {
            flippedCards = [];
            matchedCount = 0;
            clicks = 0;
            clicksDisplay.textContent = clicks;
            isLockBoard = false;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
