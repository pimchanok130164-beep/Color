<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับคู่สีสุดสนุก! 🎨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            color: #4a4a4a;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* กระดานเกม */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 90%;
            perspective: 1000px; /* ทำให้มีมิติเวลาพลิกการ์ด */
        }

        /* การ์ด */
        .card {
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        /* พลิกการ์ดเมื่อมีคลาส flipped */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* หน้าและหลังของการ์ด */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ด้านหลังการ์ด (ด้านที่ผู้เล่นเห็นตอนเริ่ม) */
        .card-back {
            background-color: #2c3e50;
            color: white;
            font-size: 2rem;
        }

        /* ด้านหน้าการ์ด (ด้านที่เป็นสี) */
        .card-front {
            transform: rotateY(180deg);
        }

        /* ปุ่มรีสตาร์ท */
        .btn-reset {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #ff7675;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>เกมจับคู่สีสุดสนุก! 🎨</h1>
    
    <div class="score-board">
        จำนวนครั้งที่เปิด: <span id="clicks">0</span> ครั้ง
    </div>

    <div class="game-board" id="board">
        </div>

    <button class="btn-reset" onclick="resetGame()">เริ่มเกมใหม่</button>

    <script>
        // รายชื่อสีที่จะใช้จับคู่ (มี 6 สี คู่กันก็จะได้ 12 การ์ดพอดี)
        const colors = [
            '#ff4757', '#ff4757', // แดง
            '#2ed573', '#2ed573', // เขียว
            '#1e90ff', '#1e90ff', // น้ำเงิน
            '#ffa502', '#ffa502', // ส้ม
            '#9b59b6', '#9b59b6', // ม่วง
            '#11bbc1', '#11bbc1'  // ฟ้าอมเขียว
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let clicks = 0;
        let isLockBoard = false;

        const board = document.getElementById('board');
        const clicksDisplay = document.getElementById('clicks');

        // ฟังก์ชันสลับตำแหน่งอาร์เรย์ (Shuffle) เพื่อให้สีสุ่มทุกครั้งที่เล่น
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // ฟังก์ชันสร้างการ์ดลงบนกระดาน
        function createBoard() {
            const shuffledColors = shuffle([...colors]);
            board.innerHTML = '';
            
            shuffledColors.forEach((color) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.color = color;

                card.innerHTML = `
                    <div class="card-front" style="background-color: ${color}"></div>
                    <div class="card-back">❓</div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        // ฟังก์ชันการพลิกการ์ด
        function flipCard() {
            // ป้องกันการกดซ้ำการ์ดเดิม หรือกดตอนที่ระบบกำลังเช็คการ์ดอยู่
            if (isLockBoard || this.classList.contains('flipped') || flippedCards.includes(this)) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                clicks++;
                clicksDisplay.textContent = clicks;
                checkMatch();
            }
        }

        // ฟังก์ชันตรวจสอบว่าการ์ดเหมือนกันไหม
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.color === card2.dataset.color;

            if (isMatch) {
                // ถ้าคู่กัน ให้ค้างไว้และล้างสถานะตัวแปร
                flippedCards = [];
                matchedCount += 2;
                
                // ถ้าชนะเกม (จับคู่ครบ 12 การ์ด)
                if (matchedCount === colors.length) {
                    setTimeout(() => {
                        alert(`ยินดีด้วยคุณชนะแล้ว! 🎉 ใช้การเปิดทั้งหมด ${clicks} ครั้ง`);
                    }, 500);
                }
            } else {
                // ถ้าไม่คู่กัน ให้คว่ำการ์ดกลับลงไป (รอ 1 วินาทีเพื่อให้ผู้เล่นจำสี)
                isLockBoard = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLockBoard = false;
                }, 1000);
            }
        }

        // ฟังก์ชันรีเซ็ตเกม
        function resetGame() {
            flippedCards = [];
            matchedCount = 0;
            clicks = 0;
            clicksDisplay.textContent = clicks;
            isLockBoard = false;
            createBoard();
        }

        // เริ่มต้นเกมครั้งแรกเมื่อโหลดหน้าเว็บ
        createBoard();
    </script>
</body>
</html>
